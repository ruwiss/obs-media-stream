<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>OBS Canlı Video (WebRTC)</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="media-container">
    <!-- Chrome sekmesinden gelen canlı WebRTC yayını bu videoda oynayacak -->
    <video id="live-video" autoplay playsinline style="width: 100vw; height: 100vh; object-fit: contain; background: transparent;"></video>
  </div>
  
  <script>
    const ws = new WebSocket('ws://localhost:3000');
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    const video = document.getElementById('live-video');

    // Chrome'dan gelen görüntüyü ve sesi anında videoya aktar
    pc.ontrack = e => {
      if (video.srcObject !== e.streams[0]) {
        video.srcObject = e.streams[0];
        console.log("OBS Yayını Almaya Başladı!");
      }
    };

    // Aday (ICE) bilgilerini geri Chrome'a gönder
    pc.onicecandidate = e => {
      if (e.candidate) {
         ws.send(JSON.stringify({ candidate: e.candidate }));
      }
    };

    // Chrome sekmesinden gelen Offer sinyalini al, onay (Answer) gönder
    ws.onmessage = async (event) => {
      const data = JSON.parse(event.data);
      
      if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        // Eğer Chrome bize "Offer" gönderdiyse
        if (data.sdp.type === 'offer') {
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({ sdp: answer })); // Answer'ı yolla
        }
      } else if (data.candidate) {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    };
  </script>
</body>
</html>
