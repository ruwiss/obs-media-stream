<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2b2e38; /* OBS Dark Theme */
      color: #e0e0e0;
      margin: 0;
      padding: 15px;
      user-select: none;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      color: #ffffff;
      font-weight: 600;
    }

    #offline-warning {
      display: none;
      background: #a80000;
      color: white;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 12px;
      text-align: center;
      font-weight: bold;
    }

    .status-container {
      text-align: center;
      margin-bottom: 15px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-size: 14px;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary { background: #0078d7; color: white; }
    .btn-primary:not(:disabled):hover { background: #005a9e; }
    
    .btn-warning { background: #ffb900; color: #000; }
    .btn-warning:not(:disabled):hover { background: #cc9400; }
    
    .btn-danger { background: #d13438; color: white; }
    .btn-danger:not(:disabled):hover { background: #a80000; }

    .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #ff3b30;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }

    .shortcut-hint {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #888;
    }

    kbd {
      background: #444;
      padding: 3px 6px;
      border-radius: 4px;
      color: #ccc;
      font-family: monospace;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" width="24" height="24" alt="logo" onerror="this.style.display='none'">
    <h3>OBS Helper</h3>
  </div>

  <div id="offline-warning">
    ⚠️ Sunucu Kapalı!<br><span style="font-weight: normal;">Lütfen OBS Helper uygulamasını başlatın.</span>
  </div>

  <div class="status-container" id="status-text">
    Durum: Kontrol Ediliyor...
  </div>

  <div id="single-action-container">
    <button class="btn btn-primary" id="action-btn" disabled>VİDEO SEÇİCİ BAŞLAT</button>
  </div>

  <div id="dual-action-container" style="display: none; gap: 10px;">
    <button class="btn btn-primary" id="new-video-btn" style="flex: 2;">YENİ SEÇ</button>
    <button class="btn btn-danger" id="stop-video-btn" style="flex: 1;">DURDUR</button>
  </div>
  
  <div class="shortcut-hint">
    Kısayol: <kbd>Alt + S</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
